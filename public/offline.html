<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booka – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 56px; }
    h1 { font-size: 22px; font-weight: 700; }
    p { font-size: 15px; color: #94a3b8; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📵</div>
  <h1>You're offline</h1>
  <p>Booka needs an internet connection to show you stores and bookings. Please check your connection and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
